{{- if .Values.verticalPodAutoscaler.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "argocd-agent-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "argocd-agent-agent.labels" . | nindent 4 }}
    {{- with .Values.verticalPodAutoscaler.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.verticalPodAutoscaler.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "argocd-agent-agent.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.verticalPodAutoscaler.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: {{ .Values.verticalPodAutoscaler.containerName | quote }}
        controlledResources:
          {{- toYaml .Values.verticalPodAutoscaler.controlledResources | nindent 10 }}
        {{- with .Values.verticalPodAutoscaler.minAllowed }}
        minAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.verticalPodAutoscaler.maxAllowed }}
        maxAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
