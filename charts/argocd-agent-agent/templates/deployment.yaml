apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argocd-agent-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "argocd-agent-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "argocd-agent-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argocd-agent-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "argocd-agent-agent.fullname" . }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - agent
            - --agent-mode={{ .Values.agentMode }}
            - --principal-server={{ .Values.server }}:{{ .Values.serverPort }}
            - --redis-addr={{ .Values.redisAddress }}
            {{- if .Values.tlsSecretName }}
            - --tls-client-secret={{ .Values.tlsSecretName }}
            {{- end }}
            {{- if .Values.tlsRootCASecretName }}
            - --tls-root-ca-secret={{ .Values.tlsRootCASecretName }}
            {{- end }}
            - --log-level={{ .Values.logLevel }}
            - --log-format={{ .Values.logFormat }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          ports:
            - name: healthz
              containerPort: 8002
              protocol: TCP
            - name: metrics
              containerPort: 8181
              protocol: TCP
